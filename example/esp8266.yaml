# web_i2c on an ESP8266 (Wemos D1 mini).
# Open http://<esp-ip>:8091/ in a browser after flashing.

esphome:
  name: web-i2c-8266

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # A fallback AP is strongly recommended so you can always reach the board,
  # even if the main network fails to associate.
  ap:
    ssid: "web-i2c-fallback"
    password: "esphome123"

logger:
api:
ota:
  - platform: esphome

external_components:
  - source: github://kaboom748/web_i2c
    components: [web_i2c]

# The REAL hardware I2C bus. Give it an explicit id: once web_i2c is present
# there are two i2c buses, so auto-resolution becomes ambiguous.
i2c:
  id: bus_a
  sda: D2            # GPIO4 on a D1 mini
  scl: D1            # GPIO5 on a D1 mini
  scan: true         # logs the addresses found at boot
  frequency: 400kHz  # 50 kHz (the default) is slow: a 1 KB framebuffer push
                     # takes ~300 ms and can starve the WiFi handshake at boot.

# The web terminal AND transparent I2C tap. It relays to bus_a.
web_i2c:
  id: i2c_debug
  i2c_id: bus_a      # relay to the real bus
  port: 8091         # open http://<esp-ip>:8091/

# Route a device THROUGH the tap (i2c_id: i2c_debug, not bus_a) to observe its
# traffic in the browser and let the boot-protection / takeover apply to it.
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    i2c_id: i2c_debug   # <-- through the tap, so the bus monitor sees it
    id: oled_display
    update_interval: 1000ms
    lambda: |-
      // draw here; keep it lightweight and NEVER busy-loop
