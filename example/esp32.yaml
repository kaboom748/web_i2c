# web_i2c on an ESP32.
# Open http://<esp-ip>:8091/ in a browser after flashing.

esphome:
  name: web-i2c-32

esp32:
  board: esp32dev
  framework:
    type: esp-idf

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "web-i2c-fallback"
    password: "esphome123"

logger:
api:
ota:
  - platform: esphome

external_components:
  - source: github://kaboom748/web_i2c
    components: [web_i2c]

# The REAL hardware I2C bus. Explicit id required (two buses once web_i2c exists).
i2c:
  id: bus_a
  sda: 21
  scl: 22
  scan: true
  frequency: 400kHz

# The web terminal AND transparent I2C tap.
web_i2c:
  id: i2c_debug
  i2c_id: bus_a
  port: 8091

# Route the display through the tap to observe it. On the ESP32's second core
# the web server never starves, so full-data monitoring is very comfortable --
# you can raise WI_TAP_DATA_MAX / WI_TAP_AGG_SLOTS in web_i2c.h if you want more.
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    i2c_id: i2c_debug
    id: oled_display
    update_interval: 1000ms
    lambda: |-
      // draw here
