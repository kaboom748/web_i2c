esphome:
  name: web-i2c-esp32

esp32:
  board: esp32dev
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

logger:
api:
ota:
  - platform: esphome

external_components:
  - source: github://kaboom748/web_i2c
    components: [web_i2c]

# the real I2C bus of the ESP (wire your SSD1306 here)
i2c:
  id: bus0
  sda: GPIO21
  scl: GPIO22
  scan: true

# the in-browser I2C console
web_i2c:
  id: i2c_debug
  i2c_id: bus0   # web_i2c is itself an I2C bus, so name the real one here
  port: 8095     # open http://<esp-ip>:8095/ in a browser
