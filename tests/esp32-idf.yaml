# CI compile test -- ESP32 (ESP-IDF framework). Local component.
esphome:
  name: ci-web-i2c-esp32-idf
esp32:
  board: esp32dev
  framework:
    type: esp-idf
wifi:
  ssid: "ci-test"
  password: "ci-test-password"
logger:
external_components:
  - source:
      type: local
      path: ../components
    components: [web_i2c]
i2c:
  id: bus0
  sda: GPIO21
  scl: GPIO22
  scan: true
web_i2c:
  id: i2c_debug
  i2c_id: bus0
  port: 8095
