name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    name: compile ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: esp8266
            file: tests/esp8266.yaml
          - name: esp32-arduino
            file: tests/esp32-arduino.yaml
          - name: esp32-idf
            file: tests/esp32-idf.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ESPHome
        run: pip install esphome
      - name: Compile ${{ matrix.name }}
        run: esphome compile ${{ matrix.file }}

  ruff:
    name: ruff (python lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint components
        run: ruff check components/
